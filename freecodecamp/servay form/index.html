<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <link rel="stylesheet"href="style.css">
  </head>

  <body>
    <h1 id="title">SURVEY FORM</h1>
      <p id="description">Enter Your Required Information.</p>
      <form id="survey-form">
        <label class="name-label" for="name">Name: <input id="name"type="text"placeholder="Enter your name" required></label>
        <label id="email-label" for="email">Email:<input id="email"
        type="email"
        placeholder="Enter your email"required></label>
        <label id="number-label" for="number">Number:<input id="number"type="number"placeholder="Enter the number"min="8"max="100"required></label>
        <label for="dropdown">Select the option:</label>
        <select id="dropdown">
          <option>student</option>
          <option>full time job</option>
          </select><br>
          <label class="option">You have a account.<br><input class="yes" type="radio" name="recommend"value="yes">yes
          <input class="no"type="radio" name="recommend"value="no">No</label><br>
          <label>Are you:<br><input type="checkbox"name="box"value="frelancer">frelancer</label>
          <label><input type="checkbox"name="box"value="servant">servant</label><br>
          <label>Add your commment:<textarea id="comments"placeholder="Enter tour comments"></textarea></label>
         <label class="btn">
          <button id="submit"type="submit">Submit</button></label>





        </form>
  </body>
</html>
